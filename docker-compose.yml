version: '3.8'

services:
  emby-media-portal:
    image: ghcr.io/rudy-yang/emby-media-portal:latest
    container_name: emby-media-portal
    restart: unless-stopped
    ports:
      - "8095:8095"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - TZ=Asia/Shanghai
    networks:
      - emby-network

networks:
  emby-network:
    driver: bridge
